spring.application.name=edusync

# Real credentials live in application-local.properties (gitignored) or in
# environment variables — NEVER hard-code them in this committed file.
# Run locally with:  SPRING_PROFILES_ACTIVE=local ./mvnw spring-boot:run
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=900
jwt.refresh-token-expiry=604800

server.port=8080

# --- Security knobs (override per environment via env vars) ---
# Comma-separated browser origins allowed by CORS.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
# Set true in production (HTTPS) so the refresh cookie is TLS-only.
app.cookie.secure=${COOKIE_SECURE:false}
# Strict is fine when SPA + API share a registrable domain; use None + secure=true if cross-site.
app.cookie.same-site=${COOKIE_SAME_SITE:Strict}
