document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"be8be998-77db-4dd3-b717-b75a016c14d7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"36d97a4c-d527-4463-8d02-1e55376f93f7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ===========================================================================\n   CodeSync Systems — Colour System\n   ---------------------------------------------------------------------------\n   Brand home is dark (Onyx). Product UI (EduSync) defaults to light; marketing\n   surfaces default to dark. Crimson is a SIGNAL, not a fill — one primary\n   action per screen. Never crimson text on white/off-white (fails WCAG AA).\n   =========================================================================== */\n\n:root {\n  /* --- Core brand palette (from brand spec) ------------------------------ */\n  --onyx:          #0D0D0D;  /* primary dark background */\n  --surface-dark:  #1A1A1A;  /* secondary dark surface — cards on dark */\n  --crimson-bright:#8C151D;  /* primary accent — CTAs, hover, active, mark */\n  --crimson-mid:   #631015;  /* hover/depth — gradient midpoint, pressed */\n  --crimson-deep:  #4A0E12;  /* logo anchor — gradient end, deep shadow */\n  --off-white:     #F5F5F3;  /* light-mode base, body text on dark */\n  --steel:         #888888;  /* secondary text, captions, labels */\n\n  /* --- Extended neutral ramp (warm-cool neutrals around Onyx/Off-White) -- */\n  --neutral-950: #0D0D0D;\n  --neutral-900: #1A1A1A;\n  --neutral-800: #262626;\n  --neutral-700: #333333;\n  --neutral-600: #4D4D4D;\n  --neutral-500: #717171;\n  --neutral-400: #888888;\n  --neutral-300: #B5B5B2;\n  --neutral-200: #D9D9D6;\n  --neutral-100: #EBEBE8;\n  --neutral-50:  #F5F5F3;\n  --white:       #FFFFFF;\n\n  /* --- Crimson ramp (for tints/borders, NOT large fills) ----------------- */\n  --crimson-900: #4A0E12;\n  --crimson-800: #631015;\n  --crimson-700: #8C151D;\n  --crimson-600: #A81C26;\n  --crimson-500: #C42531;\n  --crimson-tint-08: rgba(140, 21, 29, 0.08);  /* subtle wash on light */\n  --crimson-tint-14: rgba(140, 21, 29, 0.14);  /* hover wash on light */\n  --crimson-glow:    rgba(140, 21, 29, 0.45);  /* button glow */\n\n  /* --- Logo gradient ----------------------------------------------------- */\n  --gradient-crimson: linear-gradient(135deg, #8C151D 0%, #631015 55%, #4A0E12 100%); /* @kind color */\n  --gradient-onyx:    linear-gradient(160deg, #1A1A1A 0%, #0D0D0D 100%); /* @kind color */\n\n  /* --- Semantic / status (muted, professional — not candy) --------------- */\n  --success: #2E7D5B;\n  --success-tint: rgba(46, 125, 91, 0.12);\n  --warning: #B7791F;\n  --warning-tint: rgba(183, 121, 31, 0.12);\n  --danger:  #8C151D;   /* shares brand crimson — destructive == brand red */\n  --danger-tint: rgba(140, 21, 29, 0.10);\n  --info:    #2B5C8A;\n  --info-tint: rgba(43, 92, 138, 0.12);\n\n  /* =========================================================================\n     SEMANTIC ALIASES — LIGHT MODE (product UI default)\n     ======================================================================= */\n  --bg-base:        var(--off-white);   /* page background */\n  --bg-subtle:      #ECECE9;            /* sunken zones, table headers */\n  --surface-card:   var(--white);       /* cards, panels, sheets */\n  --surface-raised: var(--white);       /* popovers, dropdowns */\n  --surface-sunken: #ECECE9;            /* inputs, wells */\n\n  --text-strong:    var(--onyx);        /* headings */\n  --text-body:      #2A2A2A;            /* body copy */\n  --text-muted:     var(--steel);       /* secondary, captions */\n  --text-faint:     #ABABAB;            /* placeholders, disabled */\n  --text-on-accent: var(--off-white);   /* text on crimson/onyx */\n  --text-inverse:   var(--off-white);   /* text on dark surfaces */\n\n  --border-subtle:  #E2E2DF;            /* hairlines, card borders */\n  --border-default: #D4D4D0;            /* inputs, dividers */\n  --border-strong:  #BDBDB8;            /* emphasised borders */\n  --border-focus:   var(--crimson-bright);\n\n  --accent:         var(--crimson-bright);\n  --accent-hover:   var(--crimson-mid);\n  --accent-press:   var(--crimson-deep);\n  --accent-wash:    var(--crimson-tint-08);\n  --accent-wash-hover: var(--crimson-tint-14);\n\n  --focus-ring:     rgba(140, 21, 29, 0.35);\n  --overlay-scrim:  rgba(13, 13, 13, 0.55);\n}\n\n/* =========================================================================\n   SEMANTIC ALIASES — DARK MODE\n   Apply via <html data-theme=\"dark\"> (product power-users) or .theme-dark\n   wrapper (marketing surfaces, pitch decks).\n   ======================================================================= */\n[data-theme=\"dark\"],\n.theme-dark {\n  --bg-base:        var(--onyx);\n  --bg-subtle:      #141414;\n  --surface-card:   var(--surface-dark);\n  --surface-raised: #222222;\n  --surface-sunken: #121212;\n\n  --text-strong:    var(--off-white);\n  --text-body:      #E2E2DF;\n  --text-muted:     var(--steel);\n  --text-faint:     #5C5C5C;\n  --text-on-accent: var(--off-white);\n  --text-inverse:   var(--onyx);\n\n  --border-subtle:  #2A2A2A;\n  --border-default: #333333;\n  --border-strong:  #454545;\n  --border-focus:   var(--crimson-500);\n\n  --accent:         var(--crimson-500);   /* slightly brighter for dark bg */\n  --accent-hover:   var(--crimson-600);\n  --accent-press:   var(--crimson-700);\n  --accent-wash:    rgba(196, 37, 49, 0.14);\n  --accent-wash-hover: rgba(196, 37, 49, 0.22);\n\n  --focus-ring:     rgba(196, 37, 49, 0.45);\n  --overlay-scrim:  rgba(0, 0, 0, 0.65);\n}\n<\u002Fstyle>\n  <style>/* ===========================================================================\n   CodeSync Systems — Typography\n   ---------------------------------------------------------------------------\n   Inter for everything in product + body. Sora for marketing / pitch-deck\n   display headings only. Scale and tracking taken directly from brand spec §09.\n   =========================================================================== */\n\n:root {\n  /* --- Families ---------------------------------------------------------- */\n  --font-sans:    'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;\n  --font-display: 'Sora', 'Inter', system-ui, sans-serif;  /* marketing only */\n  --font-mono:    ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;\n\n  /* --- Weights ----------------------------------------------------------- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* --- Type scale (px) — spec §09 --------------------------------------- */\n  --text-display:    44px;  /* 36–48 hero / deck headline */\n  --text-h1:         32px;  /* section heading top */\n  --text-h2:         28px;\n  --text-h3:         24px;  /* section heading floor */\n  --text-h4:         20px;  /* sub-heading / card title */\n  --text-lg:         18px;\n  --text-body:       16px;  /* body default */\n  --text-sm:         15px;  /* dense body */\n  --text-label:      13px;  /* UI labels, table headers, badges */\n  --text-caption:    12px;  /* metadata, timestamps */\n  --text-micro:      11px;  /* footnotes */\n  --text-code:       13px;\n\n  /* --- Line heights ------------------------------------------------------ */\n  --leading-tight:   1.1;   /* display, large headings */\n  --leading-snug:    1.25;  /* headings */\n  --leading-normal:  1.5;   /* body */\n  --leading-relaxed: 1.65;  /* long-form reading */\n\n  /* --- Letter-spacing (tracking) — spec §09 ----------------------------- */\n  --tracking-display: -0.02em;\n  --tracking-heading: -0.01em;\n  --tracking-normal:  0;\n  --tracking-label:   0.06em;   /* UI labels (uppercase) */\n  --tracking-caption: 0.04em;\n}\n<\u002Fstyle>\n  <style>/* ===========================================================================\n   CodeSync Systems — Spacing & Layout\n   ---------------------------------------------------------------------------\n   4px base grid. Precise, no bloat — every step is intentional.\n   =========================================================================== */\n\n:root {\n  /* --- Spacing scale (4px base) ----------------------------------------- */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* --- Container widths -------------------------------------------------- */\n  --container-sm:  640px;\n  --container-md:  840px;\n  --container-lg:  1080px;\n  --container-xl:  1280px;\n  --container-2xl: 1440px;\n\n  /* --- Layout ------------------------------------------------------------ */\n  --sidebar-width:  248px;\n  --topbar-height:  64px;\n  --gutter:         24px;\n}\n<\u002Fstyle>\n  <style>/* ===========================================================================\n   CodeSync Systems — Effects: radii, borders, shadows, glow, motion\n   ---------------------------------------------------------------------------\n   Sharp & precise character. Modest radii. Layered, low-spread shadows.\n   Crimson \"glow\" on primary actions for a polished, modern feel (per brand\n   direction) — soft and controlled, never neon.\n   =========================================================================== */\n\n:root {\n  /* --- Corner radii (restrained — the brand is geometric) ---------------- */\n  --radius-xs:   4px;\n  --radius-sm:   6px;\n  --radius-md:   8px;    /* default — buttons, inputs, badges */\n  --radius-lg:   12px;   /* cards, panels */\n  --radius-xl:   16px;   /* large surfaces, modals */\n  --radius-2xl:  24px;\n  --radius-pill: 999px;\n  --radius-full: 50%;\n\n  /* --- Border widths ----------------------------------------------------- */\n  --border-hairline: 1px;\n  --border-thick:    2px;\n\n  /* --- Elevation shadows (light mode — soft, neutral, layered) ----------- */\n  --shadow-xs:  0 1px 2px rgba(13, 13, 13, 0.06);\n  --shadow-sm:  0 1px 3px rgba(13, 13, 13, 0.08), 0 1px 2px rgba(13, 13, 13, 0.05);\n  --shadow-md:  0 4px 12px rgba(13, 13, 13, 0.08), 0 2px 4px rgba(13, 13, 13, 0.05);\n  --shadow-lg:  0 12px 28px rgba(13, 13, 13, 0.12), 0 4px 8px rgba(13, 13, 13, 0.06);\n  --shadow-xl:  0 24px 56px rgba(13, 13, 13, 0.18), 0 8px 16px rgba(13, 13, 13, 0.08);\n\n  /* --- Crimson glow (the signature polished CTA effect) ------------------ */\n  /* Resting glow — subtle halo behind a primary button */\n  --glow-crimson:       0 2px 8px rgba(140, 21, 29, 0.30), 0 0 0 0 rgba(140, 21, 29, 0);\n  /* Hover glow — halo blooms outward */\n  --glow-crimson-hover: 0 4px 18px rgba(140, 21, 29, 0.45), 0 2px 6px rgba(140, 21, 29, 0.30);\n  /* Glow on dark surfaces (brighter, larger bloom) */\n  --glow-crimson-dark:       0 2px 12px rgba(196, 37, 49, 0.40);\n  --glow-crimson-dark-hover: 0 6px 24px rgba(196, 37, 49, 0.55), 0 0 12px rgba(196, 37, 49, 0.35);\n\n  /* --- Focus ring -------------------------------------------------------- */\n  --ring-width:  3px;\n  --ring:        0 0 0 var(--ring-width) var(--focus-ring);\n\n  /* --- Inner shadow (inputs, wells) -------------------------------------- */\n  --shadow-inset: inset 0 1px 2px rgba(13, 13, 13, 0.06);\n\n  /* =======================================================================\n     MOTION — fast & decisive (spec §10). Nothing lingers.\n     ======================================================================= */\n  --duration-micro:   120ms;  /* @kind other */ /* hover, focus */\n  --duration-enter:   180ms;  /* @kind other */ /* component entrances */\n  --duration-exit:    140ms;  /* @kind other */ /* component exits */\n  --duration-route:   280ms;  /* @kind other */ /* page / route transitions */\n\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);   /* @kind other */ /* decisive settle */\n  --ease-in:     cubic-bezier(0.4, 0, 1, 1);      /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);  /* @kind other */\n  --ease-standard: ease-out;                      /* @kind other */\n}\n\n/* Dark surfaces use deeper, blacker shadows */\n[data-theme=\"dark\"],\n.theme-dark {\n  --shadow-xs:  0 1px 2px rgba(0, 0, 0, 0.40);\n  --shadow-sm:  0 1px 3px rgba(0, 0, 0, 0.50), 0 1px 2px rgba(0, 0, 0, 0.40);\n  --shadow-md:  0 4px 12px rgba(0, 0, 0, 0.55), 0 2px 4px rgba(0, 0, 0, 0.40);\n  --shadow-lg:  0 12px 28px rgba(0, 0, 0, 0.60), 0 4px 8px rgba(0, 0, 0, 0.45);\n  --shadow-xl:  0 24px 56px rgba(0, 0, 0, 0.70), 0 8px 16px rgba(0, 0, 0, 0.50);\n  --glow-crimson:       var(--glow-crimson-dark);\n  --glow-crimson-hover: var(--glow-crimson-dark-hover);\n}\n<\u002Fstyle>\n  <style>/* ===========================================================================\n   CodeSync Systems — Base / reset\n   ---------------------------------------------------------------------------\n   Minimal, opinionated reset + sensible element defaults wired to tokens.\n   =========================================================================== */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-body);\n  line-height: var(--leading-normal);\n  font-weight: var(--weight-regular);\n  color: var(--text-body);\n  background: var(--bg-base);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\n/* Headings default to display tracking; family stays Inter unless .font-display */\nh1, h2, h3, h4, h5, h6 {\n  margin: 0;\n  color: var(--text-strong);\n  font-weight: var(--weight-medium);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-heading);\n}\n\np { margin: 0; }\n\na {\n  color: var(--accent);\n  text-decoration: none;\n  transition: color var(--duration-micro) var(--ease-out);\n}\na:hover { color: var(--accent-hover); }\n\ncode, pre, kbd, samp { font-family: var(--font-mono); font-size: var(--text-code); }\n\nimg, svg, video { display: block; max-width: 100%; }\n\nbutton, input, select, textarea { font: inherit; color: inherit; }\n\n:focus-visible { outline: none; box-shadow: var(--ring); }\n\n::selection { background: var(--crimson-tint-14); }\n\n/* Marketing display headline helper */\n.font-display { font-family: var(--font-display); }\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.001ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.001ms !important;\n  }\n}\n<\u002Fstyle>\n  <style>/* ===========================================================================\n   CodeSync Systems — Design System entry point\n   ---------------------------------------------------------------------------\n   Consumers link THIS file only. It is a manifest of @import lines — no rules\n   live here directly. Everything reached transitively ships to consumers.\n   =========================================================================== */\n\n/* ===========================================================================\n   CodeSync Systems — Webfonts\n   Inter ( 153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"be8be998-77db-4dd3-b717-b75a016c14d7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"36d97a4c-d527-4463-8d02-1e55376f93f7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"be8be998-77db-4dd3-b717-b75a016c14d7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"36d97a4c-d527-4463-8d02-1e55376f93f7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"be8be998-77db-4dd3-b717-b75a016c14d7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"36d97a4c-d527-4463-8d02-1e55376f93f7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ===========================================================================\n   CodeSync Systems — Colour System\n   ---------------------------------------------------------------------------\n   Brand home is dark (Onyx). Product UI (EduSync) defaults to light; marketing\n   surfaces default to dark. Crimson is a SIGNAL, not a fill — one primary\n   action per screen. Never crimson text on white/off-white (fails WCAG AA).\n   =========================================================================== */\n\n:root {\n  /* --- Core brand palette (from brand spec) ------------------------------ */\n  --onyx:          #0D0D0D;  /* primary dark background */\n  --surface-dark:  #1A1A1A;  /* secondary dark surface — cards on dark */\n  --crimson-bright:#8C151D;  /* primary accent — CTAs, hover, active, mark */\n  --crimson-mid:   #631015;  /* hover/depth — gradient midpoint, pressed */\n  --crimson-deep:  #4A0E12;  /* logo anchor — gradient end, deep shadow */\n  --off-white:     #F5F5F3;  /* light-mode base, body text on dark */\n  --steel:         #888888;  /* secondary text, captions, labels */\n\n  /* --- Extended neutral ramp (warm-cool neutrals around Onyx/Off-White) -- */\n  --neutral-950: #0D0D0D;\n  --neutral-900: #1A1A1A;\n  --neutral-800: #262626;\n  --neutral-700: #333333;\n  --neutral-600: #4D4D4D;\n  --neutral-500: #717171;\n  --neutral-400: #888888;\n  --neutral-300: #B5B5B2;\n  --neutral-200: #D9D9D6;\n  --neutral-100: #EBEBE8;\n  --neutral-50:  #F5F5F3;\n  --white:       #FFFFFF;\n\n  /* --- Crimson ramp (for tints/borders, NOT large fills) ----------------- */\n  --crimson-900: #4A0E12;\n  --crimson-800: #631015;\n  --crimson-700: #8C151D;\n  --crimson-600: #A81C26;\n  --crimson-500: #C42531;\n  --crimson-tint-08: rgba(140, 21, 29, 0.08);  /* subtle wash on light */\n  --crimson-tint-14: rgba(140, 21, 29, 0.14);  /* hover wash on light */\n  --crimson-glow:    rgba(140, 21, 29, 0.45);  /* button glow */\n\n  /* --- Logo gradient ----------------------------------------------------- */\n  --gradient-crimson: linear-gradient(135deg, #8C151D 0%, #631015 55%, #4A0E12 100%); /* @kind color */\n  --gradient-onyx:    linear-gradient(160deg, #1A1A1A 0%, #0D0D0D 100%); /* @kind color */\n\n  /* --- Semantic / status (muted, professional — not candy) --------------- */\n  --success: #2E7D5B;\n  --success-tint: rgba(46, 125, 91, 0.12);\n  --warning: #B7791F;\n  --warning-tint: rgba(183, 121, 31, 0.12);\n  --danger:  #8C151D;   /* shares brand crimson — destructive == brand red */\n  --danger-tint: rgba(140, 21, 29, 0.10);\n  --info:    #2B5C8A;\n  --info-tint: rgba(43, 92, 138, 0.12);\n\n  /* =========================================================================\n     SEMANTIC ALIASES — LIGHT MODE (product UI default)\n     ======================================================================= */\n  --bg-base:        var(--off-white);   /* page background */\n  --bg-subtle:      #ECECE9;            /* sunken zones, table headers */\n  --surface-card:   var(--white);       /* cards, panels, sheets */\n  --surface-raised: var(--white);       /* popovers, dropdowns */\n  --surface-sunken: #ECECE9;            /* inputs, wells */\n\n  --text-strong:    var(--onyx);        /* headings */\n  --text-body:      #2A2A2A;            /* body copy */\n  --text-muted:     var(--steel);       /* secondary, captions */\n  --text-faint:     #ABABAB;            /* placeholders, disabled */\n  --text-on-accent: var(--off-white);   /* text on crimson/onyx */\n  --text-inverse:   var(--off-white);   /* text on dark surfaces */\n\n  --border-subtle:  #E2E2DF;            /* hairlines, card borders */\n  --border-default: #D4D4D0;            /* inputs, dividers */\n  --border-strong:  #BDBDB8;            /* emphasised borders */\n  --border-focus:   var(--crimson-bright);\n\n  --accent:         var(--crimson-bright);\n  --accent-hover:   var(--crimson-mid);\n  --accent-press:   var(--crimson-deep);\n  --accent-wash:    var(--crimson-tint-08);\n  --accent-wash-hover: var(--crimson-tint-14);\n\n  --focus-ring:     rgba(140, 21, 29, 0.35);\n  --overlay-scrim:  rgba(13, 13, 13, 0.55);\n}\n\n/* =========================================================================\n   SEMANTIC ALIASES — DARK MODE\n   Apply via <html data-theme=\"dark\"> (product power-users) or .theme-dark\n   wrapper (marketing surfaces, pitch decks).\n   ======================================================================= */\n[data-theme=\"dark\"],\n.theme-dark {\n  --bg-base:        var(--onyx);\n  --bg-subtle:      #141414;\n  --surface-card:   var(--surface-dark);\n  --surface-raised: #222222;\n  --surface-sunken: #121212;\n\n  --text-strong:    var(--off-white);\n  --text-body:      #E2E2DF;\n  --text-muted:     var(--steel);\n  --text-faint:     #5C5C5C;\n  --text-on-accent: var(--off-white);\n  --text-inverse:   var(--onyx);\n\n  --border-subtle:  #2A2A2A;\n  --border-default: #333333;\n  --border-strong:  #454545;\n  --border-focus:   var(--crimson-500);\n\n  --accent:         var(--crimson-500);   /* slightly brighter for dark bg */\n  --accent-hover:   var(--crimson-600);\n  --accent-press:   var(--crimson-700);\n  --accent-wash:    rgba(196, 37, 49, 0.14);\n  --accent-wash-hover: rgba(196, 37, 49, 0.22);\n\n  --focus-ring:     rgba(196, 37, 49, 0.45);\n  --overlay-scrim:  rgba(0, 0, 0, 0.65);\n}\n\n/* ===========================================================================\n   CodeSync Systems — Typography\n   ---------------------------------------------------------------------------\n   Inter for everything in product + body. Sora for marketing / pitch-deck\n   display headings only. Scale and tracking taken directly from brand spec §09.\n   =========================================================================== */\n\n:root {\n  /* --- Families ---------------------------------------------------------- */\n  --font-sans:    'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;\n  --font-display: 'Sora', 'Inter', system-ui, sans-serif;  /* marketing only */\n  --font-mono:    ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;\n\n  /* --- Weights ----------------------------------------------------------- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* --- Type scale (px) — spec §09 --------------------------------------- */\n  --text-display:    44px;  /* 36–48 hero / deck headline */\n  --text-h1:         32px;  /* section heading top */\n  --text-h2:         28px;\n  --text-h3:         24px;  /* section heading floor */\n  --text-h4:         20px;  /* sub-heading / card title */\n  --text-lg:         18px;\n  --text-body:       16px;  /* body default */\n  --text-sm:         15px;  /* dense body */\n  --text-label:      13px;  /* UI labels, table headers, badges */\n  --text-caption:    12px;  /* metadata, timestamps */\n  --text-micro:      11px;  /* footnotes */\n  --text-code:       13px;\n\n  /* --- Line heights ------------------------------------------------------ */\n  --leading-tight:   1.1;   /* display, large headings */\n  --leading-snug:    1.25;  /* headings */\n  --leading-normal:  1.5;   /* body */\n  --leading-relaxed: 1.65;  /* long-form reading */\n\n  /* --- Letter-spacing (tracking) — spec §09 ----------------------------- */\n  --tracking-display: -0.02em;\n  --tracking-heading: -0.01em;\n  --tracking-normal:  0;\n  --tracking-label:   0.06em;   /* UI labels (uppercase) */\n  --tracking-caption: 0.04em;\n}\n\n/* ===========================================================================\n   CodeSync Systems — Spacing & Layout\n   ---------------------------------------------------------------------------\n   4px base grid. Precise, no bloat — every step is intentional.\n   =========================================================================== */\n\n:root {\n  /* --- Spacing scale (4px base) ----------------------------------------- */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* --- Container widths -------------------------------------------------- */\n  --container-sm:  640px;\n  --container-md:  840px;\n  --container-lg:  1080px;\n  --container-xl:  1280px;\n  --container-2xl: 1440px;\n\n  /* --- Layout ------------------------------------------------------------ */\n  --sidebar-width:  248px;\n  --topbar-height:  64px;\n  --gutter:         24px;\n}\n\n/* ===========================================================================\n   CodeSync Systems — Effects: radii, borders, shadows, glow, motion\n   ---------------------------------------------------------------------------\n   Sharp & precise character. Modest radii. Layered, low-spread shadows.\n   Crimson \"glow\" on primary actions for a polished, modern feel (per brand\n   direction) — soft and controlled, never neon.\n   =========================================================================== */\n\n:root {\n  /* --- Corner radii (restrained — the brand is geometric) ---------------- */\n  --radius-xs:   4px;\n  --radius-sm:   6px;\n  --radius-md:   8px;    /* default — buttons, inputs, badges */\n  --radius-lg:   12px;   /* cards, panels */\n  --radius-xl:   16px;   /* large surfaces, modals */\n  --radius-2xl:  24px;\n  --radius-pill: 999px;\n  --radius-full: 50%;\n\n  /* --- Border widths ----------------------------------------------------- */\n  --border-hairline: 1px;\n  --border-thick:    2px;\n\n  /* --- Elevation shadows (light mode — soft, neutral, layered) ----------- */\n  --shadow-xs:  0 1px 2px rgba(13, 13, 13, 0.06);\n  --shadow-sm:  0 1px 3px rgba(13, 13, 13, 0.08), 0 1px 2px rgba(13, 13, 13, 0.05);\n  --shadow-md:  0 4px 12px rgba(13, 13, 13, 0.08), 0 2px 4px rgba(13, 13, 13, 0.05);\n  --shadow-lg:  0 12px 28px rgba(13, 13, 13, 0.12), 0 4px 8px rgba(13, 13, 13, 0.06);\n  --shadow-xl:  0 24px 56px rgba(13, 13, 13, 0.18), 0 8px 16px rgba(13, 13, 13, 0.08);\n\n  /* --- Crimson glow (the signature polished CTA effect) ------------------ */\n  /* Resting glow — subtle halo behind a primary button */\n  --glow-crimson:       0 2px 8px rgba(140, 21, 29, 0.30), 0 0 0 0 rgba(140, 21, 29, 0);\n  /* Hover glow — halo blooms outward */\n  --glow-crimson-hover: 0 4px 18px rgba(140, 21, 29, 0.45), 0 2px 6px rgba(140, 21, 29, 0.30);\n  /* Glow on dark surfaces (brighter, larger bloom) */\n  --glow-crimson-dark:       0 2px 12px rgba(196, 37, 49, 0.40);\n  --glow-crimson-dark-hover: 0 6px 24px rgba(196, 37, 49, 0.55), 0 0 12px rgba(196, 37, 49, 0.35);\n\n  /* --- Focus ring -------------------------------------------------------- */\n  --ring-width:  3px;\n  --ring:        0 0 0 var(--ring-width) var(--focus-ring);\n\n  /* --- Inner shadow (inputs, wells) -------------------------------------- */\n  --shadow-inset: inset 0 1px 2px rgba(13, 13, 13, 0.06);\n\n  /* =======================================================================\n     MOTION — fast & decisive (spec §10). Nothing lingers.\n     ======================================================================= */\n  --duration-micro:   120ms;  /* @kind other */ /* hover, focus */\n  --duration-enter:   180ms;  /* @kind other */ /* component entrances */\n  --duration-exit:    140ms;  /* @kind other */ /* component exits */\n  --duration-route:   280ms;  /* @kind other */ /* page / route transitions */\n\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);   /* @kind other */ /* decisive settle */\n  --ease-in:     cubic-bezier(0.4, 0, 1, 1);      /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);  /* @kind other */\n  --ease-standard: ease-out;                      /* @kind other */\n}\n\n/* Dark surfaces use deeper, blacker shadows */\n[data-theme=\"dark\"],\n.theme-dark {\n  --shadow-xs:  0 1px 2px rgba(0, 0, 0, 0.40);\n  --shadow-sm:  0 1px 3px rgba(0, 0, 0, 0.50), 0 1px 2px rgba(0, 0, 0, 0.40);\n  --shadow-md:  0 4px 12px rgba(0, 0, 0, 0.55), 0 2px 4px rgba(0, 0, 0, 0.40);\n  --shadow-lg:  0 12px 28px rgba(0, 0, 0, 0.60), 0 4px 8px rgba(0, 0, 0, 0.45);\n  --shadow-xl:  0 24px 56px rgba(0, 0, 0, 0.70), 0 8px 16px rgba(0, 0, 0, 0.50);\n  --glow-crimson:       var(--glow-crimson-dark);\n  --glow-crimson-hover: var(--glow-crimson-dark-hover);\n}\n\n/* ===========================================================================\n   CodeSync Systems — Base / reset\n   ---------------------------------------------------------------------------\n   Minimal, opinionated reset + sensible element defaults wired to tokens.\n   =========================================================================== */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-body);\n  line-height: var(--leading-normal);\n  font-weight: var(--weight-regular);\n  color: var(--text-body);\n  background: var(--bg-base);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\n/* Headings default to display tracking; family stays Inter unless .font-display */\nh1, h2, h3, h4, h5, h6 {\n  margin: 0;\n  color: var(--text-strong);\n  font-weight: var(--weight-medium);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-heading);\n}\n\np { margin: 0; }\n\na {\n  color: var(--accent);\n  text-decoration: none;\n  transition: color var(--duration-micro) var(--ease-out);\n}\na:hover { color: var(--accent-hover); }\n\ncode, pre, kbd, samp { font-family: var(--font-mono); font-size: var(--text-code); }\n\nimg, svg, video { display: block; max-width: 100%; }\n\nbutton, input, select, textarea { font: inherit; color: inherit; }\n\n:focus-visible { outline: none; box-shadow: var(--ring); }\n\n::selection { background: var(--crimson-tint-14); }\n\n/* Marketing display headline helper */\n.font-display { font-family: var(--font-display); }\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.001ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.001ms !important;\n  }\n}\n\n<\u002Fstyle>\n  <style>/* cyrillic-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"b2a9a09d-c190-4d18-aac1-0cba05126094\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"7abc2b9a-801e-458c-81b6-f73575b08353\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"a4316f77-dd8a-430e-9991-e4a3ab0110a5\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20A 0-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a4316f77-dd8a-430e-9991-e4a3ab0110a5\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"979067cb-3250-4872-a976-4a364cca0fea\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"021a67fe-4141-4696-849d-ecf23de69346\"><\u002Fscript>\n  <script src=\"a74aaa8c-07e9-48b6-8934-b8cae30a621f\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box}\n    body{margin:0}\n    #lmsx ::-webkit-scrollbar{width:9px;height:9px}\n    #lmsx ::-webkit-scrollbar-thumb{background:rgba(120,120,120,.35);border-radius:8px}\n    #lmsx ::-webkit-scrollbar-track{background:transparent}\n    @keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n    @keyframes barY{from{transform:scaleY(0)}to{transform:scaleY(1)}}\n    @keyframes barX{from{transform:scaleX(0)}to{transform:scaleX(1)}}\n    #lmsx[data-static] *{animation-duration:0s !important;animation-delay:0s !important}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div id=\"lmsx\" style=\"min-height:100vh;background:var(--bg-subtle);font-family:var(--font-sans);color:var(--text-body);-webkit-font-smoothing:antialiased\">\n\n  <header style=\"position:sticky;top:0;z-index:60;background:rgba(245,245,243,.88);backdrop-fil structor(props){\n    super(props);\n    const M = { 'Dark':'c5', 'Light':'c6' };\n    this.state = { tab: (props && M[props.theme]) || 'c5', c5collapsed: false, c6collapsed: false };\n  }\n\n  go(t){ this.setState({ tab: t }); }\n\n  componentDidMount(){ this.enhance(); }\n  componentDidUpdate(){ this.enhance(); }\n\n  enhance(){\n    try { window.lucide && window.lucide.createIcons(); } catch(e){}\n    this.applyAccent();\n    this.applyFont();\n    this.syncTabs();\n    this.syncViews();\n    this.syncAdvanced();\n    this.syncCollapse('c5side', 'c5chev', this.state.c5collapsed);\n    this.syncCollapse('c6side', 'c6chev', this.state.c6collapsed);\n  }\n\n  syncCollapse(sideId, chevId, c){\n    const side = document.getElementById(sideId);\n    if (!side) return;\n    side.style.width = c ? '0px' : '214px';\n    side.style.opacity = c ? '0' : '1';\n    side.style.paddingLeft = c ? '0px' : '12px';\n    side.style.paddingRight = c ? '0px' : '12px';\n    side.style.borderRightWidth = c ? '0px' : '1px';\n    const chev = document.getElementById(chevId);\n    if (chev) chev.style.transform = c ? 'rotateY(180deg)' : 'none';\n  }\n\n  applyAccent(){\n    const root = document.getElementById('lmsx');\n    if (!root) return;\n    const hex = this.props.accentColor || '#8C151D';\n    const dark = `color-mix(in srgb, ${hex} 78%, #000)`;\n    const wash = `color-mix(in srgb, ${hex} 11%, transparent)`;\n    const glow = `0 0 0 1px color-mix(in srgb, ${hex} 24%, transparent), 0 8px 22px -8px color-mix(in srgb, ${hex} 55%, transparent)`;\n    root.style.setProperty('--accent', hex);\n    root.style.setProperty('--crimson-500', hex);\n    root.style.setProperty('--accent-hover', dark);\n    root.style.setProperty('--crimson-700', dark);\n    root.style.setProperty('--accent-wash', wash);\n    root.style.setProperty('--glow-crimson', glow);\n  }\n\n  applyFont(){\n    const root = document.getElementById('lmsx');\n    if (!root) return;\n    const f = this.props.fontFamily || 'Inter';\n    const stacks = {\n      'Inter': \"var(--font-sans)\",\n      'Plus Jakarta Sans': \"'Plus Jakarta Sans', var(--font-sans)\",\n      'System': \"-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif\"\n    };\n    root.style.fontFamily = stacks[f] || stacks['Inter'];\n  }\n\n  syncTabs(){\n    const t = this.state.tab;\n    document.querySelectorAll('#lmsx [data-tab]').forEach(b => {\n      const a = b.getAttribute('data-tab') === t;\n      b.style.color = a ? 'var(--text-strong)' : 'var(--text-muted)';\n      b.style.borderBottomColor = a ? 'var(--accent)' : 'transparent';\n      b.style.fontWeight = a ? '600' : '500';\n      const n = b.querySelector('.tabnum');\n      if (n) n.style.color = a ? 'var(--accent)' : 'var(--text-faint)';\n    });\n  }\n\n  syncViews(){\n    const t = this.state.tab;\n    const animate = this.props.animateData !== false;\n    const root = document.getElementById('lmsx');\n    if (root){ if (animate) root.removeAttribute('data-static'); else root.setAttribute('data-static',''); }\n    document.querySelectorAll('#lmsx [data-view]').forEach(v => {\n      const a = v.getAttribute('data-view') === t;\n      if (a){\n        v.style.display = 'block';\n        if (animate){\n          v.style.animation = 'none';\n          void v.offsetWidth;\n          v.style.animation = 'viewIn .34s var(--ease-out) both';\n        } else {\n          v.style.animation = 'none';\n        }\n        this.runCountUps(v);\n      } else {\n        v.style.display = 'none';\n      }\n    });\n  }\n\n  syncAdvanced(){\n    const show = this.props.showAdvanced !== false;\n    document.querySelectorAll('#lmsx [data-adv]').forEach(e => {\n      e.style.display = show ? '' : 'none';\n    });\n  }\n\n  runCountUps(scope){\n    const animate = this.props.animateData !== false;\n    (scope || document).querySelectorAll('.cu').forEach(el => {\n      if (el.getAttribute('data-done') === '1') return;\n      el.setAttribute('data-done', '1');\n      const to = parseFloat(el.getAttribute('data-to') || '0');\n      const dec = parseInt(el.getAttribute('data-dec') || '0', 10);\n      const pre = el.getAttribute('data-prefix') || '';\n      const suf = el.getAttribute('data-suffix') || '';\n      const dur = 950, start = performance.now();\n      const fmt = (v) => {\n        let s;\n        if (dec > 0){ const p = v.toFixed(dec).split('.'); p[0] = parseInt(p[0],10).toLocaleString('en-US'); s = p.join('.'); }\n        else { s = Math.round(v).toLocaleString('en-US'); }\n        return pre + s + suf;\n      };\n      if (!animate){ el.textContent = fmt(to); return; }\n      const ease = (k) => 1 - Math.pow(1 - k, 3);\n      const step = (now) => {\n        const k = Math.min(1, (now - start) / dur);\n        el.textContent = fmt(to * ease(k));\n        if (k < 1) requestAnimationFrame(step);\n      };\n      requestAnimationFrame(step);\n    });\n  }\n\n  renderVals(){\n    const go = (t) => () => this.go(t);\n    return {\n      onC5: go('c5'), onC6: go('c6'),\n      onC5Collapse: () => this.setState(s => ({ c5collapsed: !s.c5collapsed })),\n      onC6Collapse: () => this.setState(s => ({ c6collapsed: !s.c6collapsed })),\n\n      railC5: [\n        { i:'layout-dashboard', l:'Dashboard', col:'#fff', bg:'rgba(255,255,255,.12)' },\n        { i:'users', l:'People', col:'#8a8a8a', bg:'transparent' },\n        { i:'book-open', l:'Academics', col:'#8a8a8a', bg:'transparent' },\n        { i:'wallet', l:'Finance', col:'#8a8a8a', bg:'transparent' },\n        { i:'calendar-check', l:'Calendar', col:'#8a8a8a', bg:'transparent' },\n        { i:'bar-chart-3', l:'Analytics', col:'#8a8a8a', bg:'transparent' },\n      ],\n      navC5acad: [\n        { i:'users', l:'Students' },\n        { i:'graduation-cap', l:'Teachers' },\n        { i:'layers', l:'Classes' },\n        { i:'file-text', l:'Examinations' },\n        { i:'calendar-check', l:'Attendance' },\n      ],\n      navC5fin: [\n        { i:'wallet', l:'School fees' },\n        { i:'plane', l:'Leave' },\n        { i:'megaphone', l:'Notice board' },\n      ],\n\n      riskC1: [\n        { in:'AH', name:'Aiman Hakim', cls:'4 Amanah', reason:'Attendance 71% · 3 missed assessments', lvl:'High', c:'var(--crimson-700)', bg:'var(--crimson-tint-08)' },\n        { in:'ML', name:'Mei Ling', cls:'5 Bestari', reason:'Maths score dropped 18% this term', lvl:'Med', c:'var(--warning)', bg:'var(--warning-tint)' },\n        { in:'AR', name:'Arjun R.', cls:'4 Amanah', reason:'2 unexcused absences this week', lvl:'Med', c:'var(--warning)', bg:'var(--warning-tint)' },\n      ],\n\n      eventsC1: [\n        { day:'09', mon:'Jul', title:'SPM trial briefing', meta:'Dewan Utama · 9:00 AM' },\n        { day:'12', mon:'Jul', title:'Parent–teacher day', meta:'All blocks · full day' },\n        { day:'15', mon:'Jul', title:'Term-2 fee deadline', meta:'Finance office' },\n        { day:'21', mon:'Jul', title:'Inter-house sports', meta:'Padang · 8:00 AM' },\n      ],\n\n      noticesC1: [\n        { in:'FN', text:'Co-curricular registration closes Friday — please remind Form 4 & 5.', by:'Faridah Nasir', time:'2h ago' },\n        { in:'LK', text:'Library will close early on Thursday for stock-take.', by:'Lim Kok Wah', time:'5h ago' },\n        { in:'SR', text:'New road-safety guidelines for the school drop-off zone.', by:'Siti Rahmah', time:'Yesterday' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
